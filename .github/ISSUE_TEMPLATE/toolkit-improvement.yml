name: Toolkit Improvement
description: Suggest an improvement to the shared framework (docs, templates, scripts, instructions).
title: "improvement: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the toolkit.

        Use this template only for framework-level changes that can help all users.
        Do not include personal job-search content.

  - type: textarea
    id: pain
    attributes:
      label: What pain did you hit?
      description: Describe the friction point in the toolkit.
      placeholder: What happened and where?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the change that would fix or improve the experience.
      placeholder: What should change?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - docs
        - templates
        - scripts
        - instructions
        - workflow
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples (optional)
      description: Add anonymized examples only.
      placeholder: Screenshots, snippets, or links without personal details.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I did not include personal profile details, application content, or private search context.
          required: true
        - label: I understand personal job-search artifacts belong in local .local-user/, not in the repository.
          required: true
